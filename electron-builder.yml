appId: com.example.electronlaunchpad
productName: Electron Launchpad
directories:
  output: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
files:
  - dist/**/*
  - electron/**/*
  - package.json
asar: true
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
buildDependenciesFromSource: false
npmRebuild: false
compression: maximum
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64

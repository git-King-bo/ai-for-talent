appId: com.aitalent.desktop
productName: AI for Talent
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
asar: true
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
buildDependenciesFromSource: false
npmRebuild: false
compression: maximum
mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  category: Office
  target:
    - target: AppImage
      arch:
        - x64

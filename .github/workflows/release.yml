name: 自动部署到阿里云 ECS

on:
  push:
    branches: ['main']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build

      - name: 部署到阿里云 ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: '8.145.55.10'
          username: 'admin'
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: './dist/*'
          target: '/home/admin/www/ai-for-talent'
          strip_components: 1

name: 部署指定 Tag（回退/发布）

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '请输入要部署的 Tag 名称（例如 v1.0.0）'
        required: true
        type: string

jobs:
  deploy-tag:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取指定 Tag 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      - name: 部署到阿里云 ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: './dist/*'
          target: '/home/admin/www/ai-for-talent' # 你的实际部署目录
          strip_components: 1
